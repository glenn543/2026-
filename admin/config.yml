backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images
locale: zh_Hant

collections:
  - name: content
    label: 手冊內容
    files:
      - name: main
        label: 主要設定（航班、接送）
        file: settings.json
        format: json
        fields:
          - label: 去程航班
            name: flight_outbound
            widget: object
            fields:
              - {label: 航空公司, name: airline, widget: string}
              - {label: 出發時間, name: dep_time, widget: string}
              - {label: 出發城市（如 桃園 TPE）, name: dep_city, widget: string}
              - {label: 抵達時間, name: arr_time, widget: string}
              - {label: 抵達城市（如 廣島 HIJ）, name: arr_city, widget: string}
              - {label: 飛行時間, name: duration, widget: string}
          - label: 回程航班
            name: flight_return
            widget: object
            fields:
              - {label: 航空公司, name: airline, widget: string}
              - {label: 出發時間, name: dep_time, widget: string}
              - {label: 出發城市, name: dep_city, widget: string}
              - {label: 抵達時間, name: arr_time, widget: string}
              - {label: 抵達城市, name: arr_city, widget: string}
              - {label: 飛行時間, name: duration, widget: string}
          - label: 機場接送副標題
            name: pickup_subtitle
            widget: string
          - label: 接送車組
            name: pickup_groups
            widget: list
            fields:
              - {label: 車組標題（如 🚗 第一車 · 台北出發 · 7人）, name: label, widget: string}
              - label: 類型
                name: type
                widget: select
                options:
                  - {label: 有站點的車組, value: stops}
                  - {label: 自行前往, value: self}
              - label: 站點列表（type 為 stops 時填寫）
                name: stops
                widget: list
                required: false
                fields:
                  - {label: 時間, name: time, widget: string}
                  - {label: 地點, name: location, widget: string}
                  - {label: 人數（如 接送 2 人）, name: count, widget: string}
                  - {label: 聯絡人, name: contact, widget: string}
                  - {label: 特別提示（可留空）, name: alert, widget: string, required: false}
                  - label: 成員名單
                    name: members
                    widget: list
                    field: {label: 姓名, name: name, widget: string}
              - {label: 自行前往說明（type 為 self 時填寫）, name: self_note, widget: text, required: false}
          - label: 頁首標籤（日期、天數等）
            name: hero
            widget: object
            fields:
              - {label: 副標（英文小字）, name: eyebrow, widget: string}
              - {label: 主標城市名, name: title, widget: string}
              - {label: 英文副標題, name: subtitle, widget: string}
              - label: 標籤列表
                name: pills
                widget: list
                field: {label: 標籤, name: text, widget: string}
          - {label: 導覽列品牌名, name: nav_brand, widget: string}
          - label: 導覽列日期
            name: nav_days
            widget: list
            field: {label: 日期文字（如 5/17 日）, name: text, widget: string}
          - {label: 頁尾標題, name: footer_title, widget: string}
          - {label: 頁尾日期行程說明, name: footer_dates, widget: string}
          - {label: 頁尾航班資訊, name: footer_airline, widget: string}
          - {label: 頁尾備注, name: footer_note, widget: string}

      - name: days
        label: 每天行程
        file: content.json
        format: json
        fields:
          - label: 每天行程
            name: days
            widget: list
            summary: "{{fields.date}} {{fields.day_en}} · {{fields.title}}"
            fields:
              - {label: 日期（如 5/17）, name: date, widget: string}
              - {label: 星期英文（如 SUN）, name: day_en, widget: string}
              - {label: 天數（如 Day 1）, name: day_num, widget: string}
              - {label: 當天標題, name: title, widget: string}
              - {label: 地區名稱, name: region, widget: string}
              - label: 地區色彩樣式
                name: region_class
                widget: select
                options:
                  - {label: 廣島市（紅）, value: r-hiroshima}
                  - {label: 吳市（藍灰）, value: r-kure}
                  - {label: 宮島（朱紅）, value: r-miyajima}
                  - {label: 尾道（褐）, value: r-onomichi}
                  - {label: 島波海道（橙）, value: r-shimanami}
                  - {label: 松山（綠）, value: r-matsuyama}
                  - {label: 三原（深藍）, value: r-mihara}
                  - {label: 航班（灰）, value: r-flight}
              - {label: 交通圖示（emoji）, name: transport_icon, widget: string}
              - {label: 交通說明, name: transport, widget: string}
              - label: 住宿
                name: hotels
                widget: list
                summary: "🏨 {{fields.name}}"
                fields:
                  - {label: 飯店名稱, name: name, widget: string}
                  - {label: 地址, name: addr, widget: string}
                  - {label: Google Maps 連結, name: maps, widget: string}
                  - label: 入住成員（選填，Day 5 使用）
                    name: members
                    widget: list
                    required: false
                    field: {label: 姓名, name: name, widget: string}
              - label: 備注框（可多個，支援 HTML）
                name: notes
                widget: list
                required: false
                field: {label: 備注內容, name: text, widget: text}
              - {label: 景點區塊標題（如 推薦景點）, name: section_label, widget: string}
              - label: 景點列表
                name: spots
                widget: list
                summary: "{{fields.time}} · {{fields.name}}"
                fields:
                  - {label: 景點名稱, name: name, widget: string}
                  - {label: 英文名稱, name: en, widget: string}
                  - {label: 時間標籤（如 下午、9:00）, name: time, widget: string}
                  - {label: 圖片網址（可留空）, name: img, widget: string, required: false}
                  - {label: 景點描述, name: desc, widget: text}
                  - label: 標籤
                    name: tags
                    widget: list
                    field:
                      label: 標籤
                      name: tag
                      widget: select
                      options:
                        - {label: ⭐ 必訪, value: 必訪}
                        - {label: 🏛 歷史, value: 歷史}
                        - {label: 🍜 美食, value: 美食}
                        - {label: 🍰 甜點, value: 甜點}
                        - {label: ☕ 咖啡, value: 咖啡}
                        - {label: 🍳 早午餐, value: 早午餐}
                        - {label: 🎨 藝術, value: 藝術}
                        - {label: 🌿 自然, value: 自然}
                        - {label: 🎯 體驗, value: 體驗}
                  - {label: Google Maps 連結, name: maps, widget: string}
